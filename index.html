<!doctype html>
<html lang="de">
<head>

        <span class="feature-tile__icon" aria-hidden="true">▱</span>

      <button class="feature-tile" type="button">
        <span class="feature-tile__icon" aria-hidden="true">◴</span>
        <span class="feature-tile__label">Schnell</span>
      </button>
      <button class="feature-tile" type="button">
        <span class="feature-tile__icon" aria-hidden="true">⌯</span>
        <span class="feature-tile__label">Flexibel</span>
      </button>
    </section>
